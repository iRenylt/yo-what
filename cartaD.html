<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
	<meta name="theme-color" content="#0d0d0d">
	<title>Footage Archive</title>
  <link rel="icon" href="https://xcjzydmprmbpbqkacjwb.supabase.co/storage/v1/object/public/avatars/avatar.png" type="image/png">
	<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600,700&display=swap" rel="stylesheet">
	<style>
		:root{
			--bg:#0a0a0a;
			--card-bg:rgba(25,22,20,0.8);
			--card-bg-hover:rgba(35,30,28,0.95);
			--border:rgba(201,184,168,0.2);
			--border-hover:rgba(201,184,168,0.4);
			--text:#e8dfd5;
			--muted:rgba(232,223,213,0.6);
			--accent:#c9b8a8;
			--accent-light:#d9a574;
			--accent-dark:#a8937f;
			--text-dim:rgba(232,223,213,0.6);
			--glass:rgba(201,184,168,0.05);
			--glass-hover:rgba(201,184,168,0.1);
			--shadow-sm:0 4px 12px rgba(0,0,0,0.3);
			--shadow-md:0 12px 30px rgba(0,0,0,0.4);
			--shadow-lg:0 30px 60px rgba(0,0,0,0.5)
		}
		*{box-sizing:border-box;margin:0;padding:0}
		body{font-family:'Inter',system-ui,Segoe UI,Roboto,'Playfair Display',serif;background:var(--bg);color:var(--text);min-height:100vh}
		#avatarInput{display:none !important;visibility:hidden !important;width:0;height:0;overflow:hidden;position:absolute !important;}
		.stars{position:fixed;inset:0;background:radial-gradient(circle at center,rgba(201,184,168,0.08) 0%, #0a0a0a 100%);z-index:0}

		.stars::after {
			content: "";
			position: absolute;
			inset: 0;
			background: url('https://www.transparenttextures.com/patterns/stardust.png');
			opacity: 0.15;
			animation: starsMove 150s linear infinite;
		}

		@keyframes starsMove {
			from { background-position: 0 0; }
			to { background-position: 1000px 1000px; }
		}

		/* Animación suave para el logo (igual que en index.html) */
		@keyframes floatY {
			0% { transform: translateY(0); }
			50% { transform: translateY(-6px); }
			100% { transform: translateY(0); }
		}

		body.locked { overflow: hidden !important; height: 100vh !important; }
		body.locked > *:not(.page-lock):not(.stars) { display: none !important; }

		.page-lock {
			position: fixed;
			inset: 0;
			background: #000 !important;
			z-index: 99999;
			display: flex;
			align-items: center;
			justify-content: center;
			backdrop-filter: blur(20px);
			-webkit-backface-visibility: hidden;
			backface-visibility: hidden;
		}

		.page-lock::before {
			content: '';
			position: absolute;
			inset: 0;
			background: #000;
			z-index: -1;
		}

		.page-lock.force-solid {
			-webkit-backdrop-filter: none !important;
			backdrop-filter: none !important;
			background: #000 !important;
		}

		.lock-box {
			text-align: center;
			padding: 40px;
			width: 90%;
			max-width: 400px;
			animation: lockFadeIn 1s ease-out;
		}

		@keyframes lockFadeIn {
			from { opacity: 0; transform: scale(0.9); }
			to { opacity: 1; transform: scale(1); }
		}

		.lock-box h2 { 
			font-weight: 400; 
			margin-bottom: 30px; 
			letter-spacing: 4px; 
			color: #e8dfd5;
			text-shadow: 0 0 30px rgba(212, 165, 116, 0.25);
			font-size: 1.6rem;
		}

		.lock-box input {
			background: rgba(201, 184, 168, 0.06);
			border: 1.5px solid var(--border);
			color: #e8dfd5;
			padding: 15px 16px;
			border-radius: 14px;
			outline: none;
			text-align: center;
			font-size: 16px;
			margin-bottom: 20px;
			width: 100%;
			transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
		}

		.lock-box input:focus { 
			border-color: var(--border-hover);
			background: rgba(201, 184, 168, 0.12);
			box-shadow: 0 0 20px rgba(212, 165, 116, 0.2);
		}

		.lock-box button {
			background: linear-gradient(135deg, rgba(212,165,116,0.15), rgba(201,184,168,0.1));
			border: 1.5px solid var(--border);
			color: #d4a574;
			padding: 13px 42px;
			border-radius: 50px;
			cursor: pointer;
			text-transform: uppercase;
			letter-spacing: 2px;
			font-size: 0.8rem;
			font-weight: 600;
			transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
		}

		.lock-box button:hover { 
			background: linear-gradient(135deg, rgba(212,165,116,0.25), rgba(201,184,168,0.18));
			border-color: var(--border-hover);
			transform: translateY(-3px);
			box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3);
		}

		.lock-error {
			margin-top: 15px;
			color: #ff4444;
			font-size: 0.8rem;
			display: none;
			letter-spacing: 1px;
		}

		header{position:relative;z-index:10;padding:36px 18px 8px;text-align:center}
		header img{width:92px;height:92px;border-radius:50%;object-fit:cover;border:1px solid var(--border); animation: floatY 6s ease-in-out infinite; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 200ms ease; }
		header img:hover { transform: scale(1.05); border-color: var(--accent-light); }
		.title{font-family:'Playfair Display',serif;font-size:2rem;margin-top:12px}
		.subtitle{color:var(--muted);letter-spacing:3px;font-size:0.75rem;margin-bottom:18px}

			/* Navegación simple: solo Inicio visible */
			nav {
				position: relative;
				z-index: 1000;
				display: flex;
				justify-content: center;
				gap: 8px;
				margin: 12px auto 20px;
				padding: 0 12px;
			}

			nav a {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				background: var(--glass);
				border: 1.5px solid var(--border);
				padding: 12px 16px;
				border-radius: 18px;
				color: var(--text-dim);
				text-decoration: none;
				font-size: 0.8rem;
				text-transform: uppercase;
				letter-spacing: 1px;
				transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
				cursor: pointer;
			}

			nav a:hover { 
				color: var(--text);
				border-color: var(--border-hover);
				background: var(--glass-hover);
				transform: translateY(-3px);
				box-shadow: 0 8px 20px rgba(212, 165, 116, 0.14);
			}

		.container{max-width:980px;margin:0 auto;padding:18px;position:relative;z-index:10}
		.card{
			background:var(--card-bg);border:1px solid var(--border);border-radius:20px;
			padding:22px;margin-bottom:20px;backdrop-filter:blur(10px);
			transition:all 0.35s cubic-bezier(0.23,1,0.32,1);
			box-shadow:var(--shadow-md);position:relative
		}
		.card:hover{
			transform:translateY(-6px);background:var(--card-bg-hover);
			border-color:var(--border-hover);box-shadow:var(--shadow-lg)
		}

		/* Carta mecanografiada */
		.letter{min-height:140px;font-size:1.05rem;line-height:1.6;color:var(--muted);white-space:pre-wrap}
		.caret{display:inline-block;width:8px;height:18px;background:var(--text);margin-left:4px;animation:blink 1s steps(1,end) infinite}
		@keyframes blink{50%{opacity:0}}

		/* Video / audio grids */
		.media-grid{display:grid;grid-template-columns:1fr;gap:12px}
		@media(min-width:860px){.media-grid{grid-template-columns:1fr 1fr}}

		.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
		.btn{
			padding:10px 14px;border-radius:12px;border:1.5px solid var(--border);
			background:rgba(201,184,168,0.06);color:var(--text);cursor:pointer;
			transition:all 0.3s cubic-bezier(0.23,1,0.32,1);font-weight:600;font-size:0.85rem
		}
		.btn:hover{
			background:rgba(201,184,168,0.12);border-color:var(--border-hover);
			transform:translateY(-2px);box-shadow:0 8px 20px rgba(212,165,116,0.12)
		}

		/* Mini-juego */
		#gameArea{
			position:relative;height:240px;
			background:linear-gradient(180deg,rgba(212,165,116,0.08),transparent);
			overflow:hidden;border-radius:16px;border:1px solid var(--border);
			transition:all 0.3s ease
		}
		#gameArea:hover{border-color:var(--border-hover);background:linear-gradient(180deg,rgba(212,165,116,0.12),transparent)}
		.heart{
			position:absolute;width:44px;height:44px;
			background:linear-gradient(135deg,#d9a574,#c9b8a8);border-radius:50%;
			display:flex;align-items:center;justify-content:center;cursor:pointer;
			transform:scale(0.95);transition:all 0.13s cubic-bezier(0.23,1,0.32,1);
			box-shadow:0 4px 12px rgba(212,165,116,0.24)
		}
		.heart:hover{transform:scale(1.15);box-shadow:0 8px 20px rgba(212,165,116,0.35)}
		.heart:active{transform:scale(1.05)}

		/* secret modal */
		.secret-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:10001;align-items:center;justify-content:center;backdrop-filter:blur(12px)}
		.secret-modal.active{display:flex}
		.secret-content{background:var(--card-bg);padding:20px;border-radius:14px;max-width:520px;color:var(--text);border:1px solid var(--border);box-shadow:var(--shadow-md)}

		footer{padding:28px;text-align:center;color:var(--muted);font-size:0.8rem}

	</style>
</head>
<body style="background:#0a0a0a;color:#e8dfd5">
	<div class="stars"></div>

	<div id="pageLock" class="page-lock">
		<div class="lock-box">
			<h2 id="lockPhrase"></h2>
			<p style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 25px; letter-spacing: 3px;">REGISTROS FANTASMAS</p>
			<input type="password" id="pinInput" name="pin" placeholder="PIN SEGURIDAD" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
			<button onclick="unlockPage()">Abrir Corazón</button>
			<div id="errorMsg" class="lock-error">INTENTA DE NUEVO</div>
		</div>
	</div>

	<header>
		<img id="dynamicAvatar" src="https://i.imgur.com/iSyUemC.png" alt="avatar">
	</header>

	<nav>
		<a href="index.html">Inicio</a>
	</nav>

	<div class="container">

		<div class="card">
			<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
				<strong style="font-size:1.1rem">Carta 03/03/26</strong>
				<div class="controls">
					<button id="playLetter" class="btn">Reproducir</button>
					<button id="pauseLetter" class="btn">Pausar</button>
					<select id="speed" class="btn"><option value="50">Lento</option><option value="30" selected>Normal</option><option value="10">Rápido</option></select>
				</div>
			</div>
			<div style="margin-top:12px" class="letter" id="letterArea" aria-live="polite"></div>
		</div>

		<div class="card">
			<strong>Video de corazón para ti</strong>
			<div style="color:var(--muted);font-size:0.9rem;margin-top:8px">Todo especialmente pensado en ti ❤️</div>
			<div class="media-grid" style="margin-top:12px">
				<div>
					<video id="userVideo" controls style="width:100%;border-radius:12px;max-height:360px">
						<!-- Sustituye el src por tus videos -->
						<source src="videos/video1.mp4" type="video/mp4">
						Tu navegador no soporta video.
					</video>
				</div>

			</div>
		</div>

		<div class="card">
			<strong>Audio especial</strong>
			<div style="margin-top:8px;color:var(--muted)">Es un audio extraído que te grabé exclusivamente con mi voz para ti aunque la caliad sea muy baja 😓</div>
			<div style="margin-top:12px;display:flex;gap:12px;flex-direction:column">
				<audio controls src="audios/mensaje1.mp3"></audio>
			</div>
		</div>

	</div>

	<div id="secretModal" class="secret-modal"><div class="secret-content" id="secretContent"></div></div>

	<footer>Footage Archive 2025-2026 · Construido con amor 💕</footer>

	<script src="lock.js"></script>
	<script>
		// Texto de la carta (edítalo aquí). Mantener saltos de línea con \n.
		const LETTER_TEXT = `Mi corazón,\n\nNueve meses. Suena a número, pero para mí se siente como proceso. Como construcción. Como algo que no apareció de la nada, sino que se ha ido armando con intención, con decisiones pequeñas que repetimos todos los días.\n\nNo quiero escribirte lo típico. No quiero palabras grandes que suenen bonito pero que ya estén gastadas. Prefiero decirte algo más real: me gusta lo que estamos creando. Me gusta cómo se siente cuando estamos bien, pero también me gusta que incluso cuando algo nos mueve el piso, no salimos corriendo. Nos quedamos. Hablamos. Ajustamos.\n\nEso para mí vale más que cualquier promesa exagerada.
		\n\nSé que a veces tu mente se adelanta. Que te preguntas cosas en silencio. Que quieres sentir estabilidad, pero tu ansiedad intenta buscar grietas donde no las hay. Por eso hoy no vengo a decirte “todo será perfecto”. Vengo a decirte algo más sólido: lo que siento por ti no depende de un día bueno o uno raro. No depende de la intensidad del momento. Es una decisión constante.\n\nNo estoy contigo por emoción pasajera. Estoy porque contigo puedo proyectarme creciendo, no perdiéndome. Porque contigo no siento presión de ser alguien más. Porque cuando estoy a tu lado, no siento ruido, siento enfoque.\n\nY quiero que algo te quede muy claro: no tienes que competir con nadie, no tienes que demostrarme nada extra, no tienes que esforzarte por “merecer” mi cariño. No estoy evaluándote a pesar de que el momento ciertas veces requiera que me lo demuestres. Estoy contigo.
		\n\nAdmiro mucho tu forma de sentir. Sí, incluso esa parte intensa que a veces te asusta. Porque demuestra que amas en serio. Y yo no quiero apagar eso. Solo quiero que aprendas que conmigo puedes amar sin miedo a que el suelo desaparezca.\n\nMe acuerdo cuando me regalaste el Me 262 de papel. Tal vez para alguien más era solo un detalle creativo. Para mí fue una prueba de algo más profundo: tú observas, tú escuchas, tú cuidas. Y eso no se encuentra fácil.

No quiero que nuestra relación sea una montaña rusa emocional. Quiero que sea como una base firme desde donde podamos crecer en todo lo demás: estudios, metas, planes, sueños. Que cuando el mundo esté pesado, no seamos un problema más, sino un lugar seguro.\n\nSi algún día dudas, prefiero que me lo digas. Si algo te duele, quiero saberlo. Si algo te da miedo, no lo cargues sola. Yo no quiero una versión perfecta tuya; quiero la versión real, incluso cuando está confundida.

Y también quiero que sepas algo importante: estoy aprendiendo contigo. A ser más paciente. A escuchar mejor. A no responder desde el orgullo. Esto no es solo que tú crezcas; yo también estoy creciendo.\n\nNueve meses no son una eternidad. Pero tampoco son casualidad. Son prueba de que lo nuestro tiene intención.\n\nNo voy a prometerte un “para siempre” escrito en piedra porque no somos eternos, no vivíremos en este mundo para siempre, los humanos morimos como tal. Voy a prometerte algo más honesto: mientras esté contigo, voy a hacerlo bien. Con respeto. Con claridad. Sin juegos. Sin ambigüedades.\n\nQuiero que cuando pienses en mí, sientas calma. No incertidumbre. Quiero que cuando alguien te pregunte por nosotros, no tengas que defender nada, porque lo que vivimos habla solo.\n\nGracias por elegir quedarte. Gracias por confiar. Gracias por abrir tu mundo conmigo.\n\nYo te elijo hoy. Sin exageraciones. Con firmeza.\n\nCon todo el amor del mundo: — A.`;

		// Máquina de escribir
		const letterArea = document.getElementById('letterArea');
		let typingIndex = 0; let typingInterval = null; let typingSpeed = 30;
		function startTyping(){ if(typingInterval) return; typingInterval = setInterval(()=>{ if(typingIndex<=LETTER_TEXT.length){ letterArea.textContent = LETTER_TEXT.slice(0,typingIndex) + (typingIndex%2? '':''); typingIndex++; } else stopTyping(); }, typingSpeed); }
		function stopTyping(){ clearInterval(typingInterval); typingInterval = null; if(typingIndex>LETTER_TEXT.length) finalizeLetter(); }
		document.getElementById('playLetter').addEventListener('click', ()=>{ startTyping(); });
		document.getElementById('pauseLetter').addEventListener('click', ()=>{ stopTyping(); });
		document.getElementById('speed').addEventListener('change',(e)=>{ typingSpeed = Number(e.target.value); if(typingInterval){ stopTyping(); startTyping(); } });

		// Cargar la carta automáticamente al entrar (efecto visible)
		document.addEventListener('DOMContentLoaded', ()=>{ // dejaremos que el PIN controle mostrar la página
			letterArea.textContent = '';
		});

		// Frases aleatorias para la pantalla de bloqueo (igual que recuerdos.html)
		const phrases = [
			"UN ARCHIVO SECRETO",
        "EN CADA MOMENTO",
        "CADA SEGUNDO CONTIGO",
        "RECUERDOS QUE VIVEN",
        "UN VIAJE ESPECIAL",
        "TÚ LUGAR ESPECIAL",
        "CORAZÓN EN LA MANO",
        "GRAVEDAD SIN EXPLICACIÓN",
        "COMPLETAMENTE CAUTIVADORA",
        "ALMA NATURAL ENCONTRADA",
        "AMOR SIN MEDIDA",
        "UN REGALO DEL UNIVERSO",
        "DONDE TÚ ESTÉS, IRÉ",
        "PUNTO DE NO RETORNO",
        "PERFECTAMENTE IMPERFECTA",
        "UN SUEÑO HECHO REALIDAD",
        "FORTALEZA EN TUS MANOS",
        "ENTRE TUS BRAZOS SOY LIBRE",
        "CADA LATIDO TE LLAMA",
        "ERES MI DEBILIDAD MÁS HERMOSA",
        "PARA AMARTE EN CUALQUIER MOMENTO",
        "SUEÑO DESPIERTO CONTIGO",
        "MI DESTINO ERES TÚ",
        "EL TIEMPO SE DETIENE"
		];
		const phraseElement = document.getElementById('lockPhrase');
		if (phraseElement) {
			phraseElement.textContent = phrases[Math.floor(Math.random() * phrases.length)];
		}

		// El bloqueo compartido de lock.js controla esta página.

		// Preparar secretos: envolver palabras clave en la carta cuando termine la escritura
		function finalizeLetter() {
			const html = letterArea.textContent
				.replace(/(amor)/gi, '<span class="secret-word">$1</span>')
				.replace(/(cariño)/gi, '<span class="secret-word">$1</span>')
				.replace(/(TE AMO)/g, '<span class="secret-word" style="color:var(--accent);font-weight:600">$1</span>');
			letterArea.innerHTML = html;
			document.querySelectorAll('#letterArea .secret-word').forEach(word => {
				word.style.cursor = 'pointer';
				word.addEventListener('click', () => {
					showSecret('Palabra secreta', 'Cada palabra guarda un pensamiento que te pertenece.');
				});
			});
		}

		// Secret words
		function showSecret(title, text){ const modal = document.getElementById('secretModal'); const content = document.getElementById('secretContent'); content.innerHTML = `<h3 style="margin-bottom:8px">${title}</h3><div style="color:var(--muted)">${text}</div><div style="margin-top:12px;text-align:right"><button class="btn" onclick="document.getElementById('secretModal').classList.remove('active')">Cerrar</button></div>`; modal.classList.add('active'); modal.addEventListener('click', (e)=>{ if(e.target===modal) modal.classList.remove('active'); }); }
		document.querySelectorAll('.secret-word').forEach(w=>{ w.addEventListener('click', ()=>{ showSecret('Pequeño secreto', 'Te amo más de lo que las palabras dejan ver.'); }); });

		// Konami simple
		const konami = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a']; let kindex=0; document.addEventListener('keydown',(e)=>{ if(e.key === konami[kindex]){ kindex++; if(kindex===konami.length){ showSecret('Konami', '¡Nivel secreto desbloqueado! Te mereces una sorpresa.'); kindex=0 } } else kindex = e.key===konami[0]?1:0; });

		// Secreto: Click en el título principal
		const mainTitle = document.querySelector('.title');
		if (mainTitle) {
			mainTitle.style.cursor = 'pointer';
			mainTitle.addEventListener('click', () => {
				showSecret('Carta', 'Este título guarda el primer secreto: todo esto fue hecho pensando en ti.');
			});
		}

		// Mostrar carta y empezar typing cuando se desbloquea la página
		// Observamos cambios en body.locked (lock.js quita .locked cuando se desbloquea)
		const observer = new MutationObserver(()=>{ if(!document.body.classList.contains('locked')){ // página desbloqueada
				startTyping(); // iniciar carta
			}});
		observer.observe(document.body,{attributes:true,attributeFilter:['class']});

		// Small compatibility: ensure dynamicAvatar + avatarInput exist for lock.js features
		(function ensureAvatarInput(){ if(!document.getElementById('avatarInput')){ const inp = document.createElement('input'); inp.type='file'; inp.id='avatarInput'; inp.accept='image/*'; inp.style.display='none'; document.body.appendChild(inp); }})();

	</script>
</body>
</html>
