<html lang="es">

<head>
    <meta name="theme-color" content="#0d0d0d">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Footage Archive</title>
    <link rel="icon" href="https://xcjzydmprmbpbqkacjwb.supabase.co/storage/v1/object/public/audios/fa-phnrcords-modified.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f5e6d3;
            --accent: #d4a574;
            --accent-light: #e8c48f;
            --accent-dark: #a67c52;
            --bg: #0d0d0d;
            --card-bg: rgba(28, 24, 20, 0.85);
            --card-bg-hover: rgba(35, 30, 25, 0.95);
            --text-main: #f5e6d3;
            --text-dim: rgba(245, 230, 211, 0.7);
            --glass: rgba(212, 165, 116, 0.08);
            --glass-hover: rgba(212, 165, 116, 0.12);
            --border: rgba(212, 165, 116, 0.25);
            --border-hover: rgba(212, 165, 116, 0.5);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 12px 30px rgba(0, 0, 0, 0.45);
            --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1612 100%);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(1rem, 5vw, 2rem);
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 2.5rem);
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #f5e6d3, #e8c48f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            background: var(--card-bg-hover);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .comment-content {
            margin-bottom: 20px;
        }

        .comment-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-main);
            margin-bottom: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .comment-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .comment-time {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .comment-badge {
            display: inline-block;
            padding: clamp(0.3rem, 1vw, 0.5rem) clamp(0.75rem, 2vw, 1rem);
            background: rgba(212, 165, 116, 0.15);
            border: 1px solid var(--accent);
            border-radius: 20px;
            font-size: clamp(0.65rem, 1.3vw, 0.8rem);
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: var(--transition-smooth, all 0.3s ease);
        }
        
        .comment-badge:hover {
            background: rgba(212, 165, 116, 0.25);
            box-shadow: 0 0 15px rgba(212, 165, 116, 0.3);
        }

        .loading {
            text-align: center;
            color: var(--text-dim);
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid var(--glass);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .update-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .card.updated {
            animation: highlight 0.6s ease;
        }

        @keyframes highlight {
            0% { border-color: #4ade80; box-shadow: 0 0 20px rgba(74, 222, 128, 0.3); }
            100% { border-color: var(--border); }
        }

        /* 🔒 BLOQUEO */
        body.locked { overflow: hidden !important; height: 100vh !important; }
        body.locked > *:not(.page-lock):not(.stars) { display: none !important; }

        .page-lock {
            position: fixed;
            inset: 0;
            background: #000 !important;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        .page-lock::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #000;
            z-index: -1;
        }

        .page-lock.force-solid {
            -webkit-backdrop-filter: none !important;
            backdrop-filter: none !important;
            background: #000 !important;
        }

        .lock-box {
            text-align: center;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            animation: lockFadeIn 1s ease-out;
            background: linear-gradient(180deg, rgba(200,200,220,0.03), rgba(170,170,190,0.01));
            border: 1.5px solid rgba(200,200,220,0.15);
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 40px rgba(200,200,220,0.05);
        }

        @keyframes lockFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .lock-box h2 {
            font-weight: 400;
            margin-bottom: 30px;
            letter-spacing: 4px;
            color: #e8dfd5;
            text-shadow: 0 0 20px rgba(232, 223, 213, 0.08);
        }

        .lock-box input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1.5px solid rgba(200,200,220,0.15);
            background: rgba(255,255,255,0.03);
            color: #e8dfd5;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .lock-box input:focus {
            border-color: rgba(200,200,220,0.3);
            background: rgba(200,200,220,0.05);
            box-shadow: 0 0 20px rgba(200,200,220,0.1);
        }

        .lock-box button {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1.5px solid rgba(200,200,220,0.15);
            background: linear-gradient(135deg, rgba(200,200,220,0.08), rgba(170,170,190,0.04));
            color: #e8dfd5;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lock-box button:hover {
            background: linear-gradient(135deg, rgba(200,200,220,0.15), rgba(170,170,190,0.08));
            border-color: rgba(200,200,220,0.3);
            box-shadow: 0 10px 30px rgba(200,200,220,0.1);
            transform: translateY(-2px);
        }

        .lock-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }

        .lock-error.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* NAV */
        nav {
            position: relative;
            z-index: 1000;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 100%;
            margin: 0 auto 50px;
            padding: 0 12px;
            justify-content: center;
            align-items: center;
        }

        nav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            border: 1.5px solid var(--border);
            padding: 12px 16px;
            border-radius: 22px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        nav a:hover {
            color: #fff;
            border-color: var(--border-hover);
            background: var(--glass-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 183, 213, 0.1);
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
            }

            .comment-text {
                font-size: 1rem;
            }

            nav {
                gap: 6px;
                margin-bottom: 35px;
                padding: 0 8px;
            }

            nav a {
                padding: 9px 12px;
                font-size: 0.68rem;
                border-radius: 15px;
            }
        }
    </style>
    <style id="pin-styles">
    @keyframes shake { 0%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}100%{transform:translateX(0);} }
    .page-lock { display: none; align-items: center; justify-content: center; position: fixed; inset: 0; background: radial-gradient(circle at top, rgba(212,165,116,0.14), rgba(10,10,10,0.98)); z-index: 99999; padding: 20px; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
    .page-lock.active { display: flex; }
    .page-lock.force-solid { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; }

    .lock-box h2 { font-size: clamp(1.1rem, 3.4vw, 1.6rem); margin-bottom: 8px; letter-spacing: 4px; color: #f7e7c9; text-shadow: 0 0 30px rgba(212,165,116,0.2); }
    .lock-box p { margin: 0 0 20px; color: rgba(255,242,220,0.7); font-size: 0.85rem; letter-spacing: 2px; }
    .lock-box input { width: 100%; padding: 14px 16px; font-size: 16px; border-radius: 12px; border: 1.5px solid rgba(212,165,116,0.26); background: rgba(255,248,235,0.06); color: #fff; outline: none; text-align: center; }
    .lock-box input:focus { box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 0 30px rgba(212,165,116,0.16); border-color: rgba(212,165,116,0.4); background: rgba(255,244,224,0.1); }
    .lock-box button { margin-top: 14px; padding: 13px 36px; border-radius: 999px; border: 1.5px solid rgba(212,165,116,0.28); background: linear-gradient(135deg, rgba(212,165,116,0.22), rgba(232,196,143,0.12)); color: #fff; cursor: pointer; font-weight: 600; }
    .lock-box button:hover { transform: translateY(-3px); }
    .lock-error { color: #ff6b6b; font-size: 0.85rem; margin-top: 12px; display: none; }
    .lock-error.show { display: block; animation: shake 420ms ease; }
    body.locked { overflow: hidden !important; height: 100vh !important; }
    body.locked > *:not(.page-lock):not(.stars) { display: none !important; }
    </style>
</head>

<body>

<div id="pageLock" class="page-lock">
    <div class="lock-box">
        <h2 id="lockPhrase"></h2>
        <p style="font-size: 0.7rem; color: var(--text-dim); margin-bottom: 25px; letter-spacing: 3px;">REGISTROS FANTASMAS</p>
        <input type="password" id="pinInput" name="pin" placeholder="PIN SEGURIDAD" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button onclick="unlockPage()">Abrir Corazón</button>
        <div id="errorMsg" class="lock-error">INTENTA DE NUEVO</div>
    </div>
</div>
<script>
    // Forzar visibilidad temprana del overlay si algo bloquea la ejecución de lock.js
    (function(){
        try {
            if (document.body) document.body.classList.add('locked');
            const pl = document.getElementById('pageLock');
            if (pl) {
                pl.classList.add('active');
                pl.style.display = 'flex';
                pl.style.zIndex = '99999';
            }
        } catch (e) { console.warn('force pageLock show failed', e); }
    })();

    // Fallback de desbloqueo: intenta unlockPage(), si no existe, maneja localmente
    (function(){
        function fallbackUnlock() {
            try {
                const pinEl = document.getElementById('pinInput');
                const val = pinEl ? (pinEl.value || '').trim() : '';
                const correct = '0906';
                const err = document.getElementById('errorMsg');
                if (val === correct) {
                    // Si unlockPage existe, delegar
                    if (typeof unlockPage === 'function') return unlockPage();

                    // Ocultar overlay y restaurar contenido
                    const pl = document.getElementById('pageLock');
                    if (pl) {
                        pl.classList.remove('active');
                        pl.classList.remove('force-solid');
                        pl.style.display = 'none';
                        pl.style.pointerEvents = 'none';
                    }
                    document.body.classList.remove('locked');
                    document.body.classList.remove('initializing');

                    document.body.querySelectorAll('*').forEach((el) => {
                        if (el.id !== 'pageLock' && !el.classList.contains('stars') && !el.id.startsWith('initialSplash')) {
                            el.style.visibility = 'visible';
                            el.style.display = '';
                        }
                    });

                    if (typeof window.__removeInitializing === 'function') window.__removeInitializing();
                    return;
                }

                if (err) {
                    err.style.display = 'block';
                    err.classList.add('show');
                    setTimeout(() => { if (err) { err.classList.remove('show'); err.style.display = 'none'; } }, 800);
                }
                if (pinEl) {
                    pinEl.style.borderColor = 'rgba(255,107,107,0.6)';
                    setTimeout(() => { try { pinEl.style.borderColor = ''; } catch(e){} }, 500);
                }
            } catch (e) { console.error('fallbackUnlock error', e); }
        }

        // Enlazar botón
        const btn = document.querySelector('#pageLock .lock-box button');
        if (btn) {
            btn.addEventListener('click', () => {
                if (typeof unlockPage === 'function') return unlockPage();
                fallbackUnlock();
            });
        }

        // Enlazar Enter en el input como fallback
        const pinInput = document.getElementById('pinInput');
        if (pinInput) {
            pinInput.addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter') {
                    ev.preventDefault();
                    if (typeof unlockPage === 'function') return unlockPage();
                    fallbackUnlock();
                }
            });
        }
    })();
</script>

            <p>Actualización en tiempo real</p>
        </div>

        <div id="commentCard" class="card">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando comentarios...</p>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = "https://xcjzydmprmbpbqkacjwb.supabase.co/";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjanp5ZG1wcm1icGJxa2FjandiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwNzY1NjEsImV4cCI6MjA4MzY1MjU2MX0.Bpr4H2iZPl5JWW8rTXp4nBiB1Z_c7pIhKXiThydeNUw";

        let ultimoComentarioId = null;

        async function cargarComentarios() {
            try {
                const respuesta = await fetch(
                    `${SUPABASE_URL}rest/v1/comentarios?order=created_at.desc&limit=1`,
                    {
                        headers: {
                            "apikey": SUPABASE_KEY,
                            "Authorization": "Bearer " + SUPABASE_KEY,
                            "Content-Type": "application/json"
                        }
                    }
                );

                if (!respuesta.ok) throw new Error("Error al obtener comentarios");

                const datos = await respuesta.json();
                
                if (!datos || datos.length === 0) {
                    mostrarEstadoVacio();
                    return;
                }

                const comentario = datos[0];
                
                // Detectar si es un comentario nuevo
                const esNuevo = ultimoComentarioId !== comentario.id;
                ultimoComentarioId = comentario.id;

                mostrarComentario(comentario, esNuevo);
            } catch (error) {
                console.error("Error:", error);
                mostrarError(error.message);
            }
        }

        function mostrarComentario(comentario, esNuevo = false) {
            const card = document.getElementById("commentCard");
            const fechaCreacion = new Date(comentario.created_at);
            const tiempoFormateado = formatearFecha(fechaCreacion);

            card.innerHTML = `
                <div class="comment-content">
                    <p class="comment-text">${escaparHTML(comentario.mensaje)}</p>
                    <div class="comment-meta">
                        <span class="comment-time">${tiempoFormateado}</span>
                        <span class="comment-badge">Último</span>
                    </div>
                </div>
            `;

            if (esNuevo) {
                card.classList.remove("updated");
                void card.offsetWidth; // Forzar reflow
                card.classList.add("updated");
            }
        }

        function mostrarEstadoVacio() {
            const card = document.getElementById("commentCard");
            card.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <p>Aún no hay comentarios</p>
                    <p style="font-size: 0.9rem; margin-top: 10px;">Los nuevos comentarios aparecerán aquí</p>
                </div>
            `;
        }

        function mostrarError(mensaje) {
            const card = document.getElementById("commentCard");
            card.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <p>Error al cargar comentarios</p>
                    <p style="font-size: 0.9rem; margin-top: 10px; color: #ff6b6b;">${mensaje}</p>
                </div>
            `;
        }

        function formatearFecha(fecha) {
            const ahora = new Date();
            const diferencia = ahora - fecha;
            const segundos = Math.floor(diferencia / 1000);
            const minutos = Math.floor(segundos / 60);
            const horas = Math.floor(minutos / 60);
            const dias = Math.floor(horas / 24);

            if (segundos < 60) return "Justo ahora";
            if (minutos < 60) return `${minutos} min atrás`;
            if (horas < 24) return `${horas}h atrás`;
            if (dias < 7) return `${dias}d atrás`;

            return fecha.toLocaleDateString("es-ES", {
                day: "2-digit",
                month: "2-digit",
                year: "numeric",
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function escaparHTML(texto) {
            const mapa = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return texto.replace(/[&<>"']/g, m => mapa[m]);
        }

        // Cargar comentarios inicialmente
        cargarComentarios();

        // Actualizar cada 3 segundos
        setInterval(cargarComentarios, 3000);
    </script>

    <script src="lock.js"></script>
    <script>
        // Forzar inyección de estilos y enlaces de eventos del PIN
        if (typeof injectPinStyles === 'function') {
            try { injectPinStyles(); } catch (e) { /* ignorar */ }
        }
        if (typeof bindPinInputEvents === 'function') {
            try { bindPinInputEvents(); } catch (e) { /* ignorar */ }
        }

        // Asegurar que el bloqueo se inicializa después de cargar lock.js
        if (typeof verificarBloqueo === 'function') {
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', verificarBloqueo);
            } else {
                verificarBloqueo();
            }
        }
    </script>
